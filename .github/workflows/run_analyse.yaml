name: Update OmgevingsCheck Data

on:
  schedule:
    - cron: '0 0 * * 1' # Elke maandag om 00:00 (UTC)
  workflow_dispatch:      # Handmatige trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    

    # OPTIE 2: Forceer Node 24 voor alle stappen in deze job
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # OPTIE 1: Versies verhoogd naar @v5 (ondersteunen Node 24+)
      - name: Code ophalen
        uses: actions/checkout@v5

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Afhankelijkheden installeren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analyse uitvoeren
        run: python bevraging_vlaanderen.py

      - name: Resultaten opslaan (Commit & Push)
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add resultaten_analyse/
          git commit -m "Automatische data update: $(date +'%d-%m-%Y')" || exit 0
          git push
